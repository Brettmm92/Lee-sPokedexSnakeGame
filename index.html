<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lee's Pokédex Snake Game</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:#0a0a0f;min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
  background-image:linear-gradient(rgba(200,255,0,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(200,255,0,0.07) 1px,transparent 1px);
  background-size:28px 28px;background-position:center center;background-attachment:fixed;
}
#bg-pb{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;opacity:0.045;pointer-events:none;z-index:0;}
#gb{
  font-family:'Press Start 2P',monospace;
  background:linear-gradient(160deg,#f5c000,#e0ad00);
  border-radius:12px 12px 40px 12px;
  width:100%;max-width:440px;
  padding:10px 10px 28px;
  box-shadow:inset 0 2px 0 rgba(255,255,255,0.25),0 6px 0 #9a7200,0 0 40px rgba(200,255,0,0.12);
  position:relative;z-index:1;margin:10px;
}
#bezel{background:#b87c00;border-radius:8px 8px 16px 8px;padding:7px;margin-bottom:10px;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5);}
#slabel{font-size:8px;color:rgba(0,0,0,0.32);letter-spacing:1px;text-align:center;margin-bottom:5px;line-height:1.8;}
#sborder{background:#111;border-radius:4px;padding:3px;position:relative;}
#hud{display:flex;justify-content:space-between;padding:2px 2px 4px;font-size:8px;color:rgba(255,255,255,0.4);}
#hud span{color:rgba(255,255,255,0.4);}
#hud span span{color:#5dc8b8;}
#gamecanvas{display:block;width:100%;height:auto;border-radius:3px;image-rendering:pixelated;}
#dexoverlay{
  display:none;position:absolute;top:3px;left:3px;right:3px;bottom:3px;
  border-radius:3px;background:#071a18;flex-direction:column;overflow:hidden;z-index:10;
}
#dexoverlay.show{display:flex;}
#dextop{flex-shrink:0;padding:8px 8px 4px;text-align:center;}
#dextitle{font-size:12px;color:#c8ff00;text-shadow:0 0 10px #c8ff00;margin-bottom:6px;line-height:1.8;}
#dexsub{font-size:8px;color:#5dc8b8;margin-bottom:4px;}
#dexscroll{flex:1;overflow-y:auto;padding:6px 6px 44px;-webkit-overflow-scrolling:touch;}
#dexscroll::-webkit-scrollbar{width:3px;}
#dexscroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);}
#dexscroll::-webkit-scrollbar-thumb{background:#5dc8b8;border-radius:2px;}
#dexgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.dexcell{background:rgba(50,180,160,0.08);border:0.5px solid rgba(50,180,160,0.2);border-radius:6px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.dexcell img{width:56px;height:56px;image-rendering:pixelated;}
.dexnum{font-size:5px;color:#5dc8b8;}
.dexname{font-size:6px;color:#fff;text-align:center;line-height:1.6;word-break:break-word;}
#dexbottom{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);padding:10px;text-align:center;}
#dexbottom span{font-size:8px;color:#ffee55;text-shadow:0 0 6px #ffee55;}
#dbar{text-align:center;font-size:5px;color:rgba(0,0,0,0.45);margin:5px 0 4px;}
#dbar span{color:#7a4000;font-size:6px;}
#bctrl{display:flex;justify-content:space-between;align-items:center;padding:0 4px;margin-top:10px;gap:4px;}
#dpad{position:relative;width:168px;height:168px;flex-shrink:0;}
.dp{
  position:absolute;background:linear-gradient(180deg,#8a5800,#6a4000);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#f0c060;font-size:20px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
  border-radius:9px;box-shadow:0 5px 0 #3a2000;width:54px;height:54px;font-family:'Press Start 2P',monospace;
}
.dp:active{transform:translateY(4px);box-shadow:0 1px 0 #3a2000;}
#dup{top:0;left:57px;}#ddn{bottom:0;left:57px;}#dlt{top:57px;left:0;}#drt{top:57px;right:0;}
#abwrap{display:flex;align-items:flex-end;gap:14px;padding-right:4px;}
.ab{
  border:none;border-radius:50%;cursor:pointer;font-family:'Press Start 2P',monospace;color:#fff;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
  display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.35;padding:4px;
  box-shadow:0 4px 0 #880000;
}
#btnB{width:62px;height:62px;font-size:9px;background:radial-gradient(circle at 38% 35%,#ff7070,#cc0000);margin-bottom:16px;}
#btnA{width:72px;height:72px;font-size:9px;background:radial-gradient(circle at 38% 35%,#ff7070,#cc0000);}
#btnB:active,#btnA:active{transform:translateY(3px);box-shadow:0 1px 0 #880000;}

</style>
</head>
<body>
<svg id="bg-pb" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="94" fill="none" stroke="#c8ff00" stroke-width="5"/>
  <line x1="6" y1="100" x2="194" y2="100" stroke="#c8ff00" stroke-width="5"/>
  <circle cx="100" cy="100" r="22" fill="none" stroke="#c8ff00" stroke-width="5"/>
  <circle cx="100" cy="100" r="11" fill="#c8ff00"/>
  <path d="M6,100 A94,94 0 0,1 194,100" fill="#c8ff00" opacity="0.1"/>
</svg>
<div id="gb">
  <div id="bezel">
    <div id="slabel">LEE'S POKÉDEX SNAKE GAME</div>
    <div id="sborder">
      <div id="hud"><span>SCORE:<span id="sc" style="margin-left:3px;">0</span></span><span>BEST:<span id="hi" style="margin-left:3px;">0</span></span></div>
      <canvas id="gamecanvas" width="380" height="360"></canvas>
      <div id="dexoverlay">
        <div id="dextop"><div id="dextitle"></div><div id="dexsub"></div></div>

  <div id="bctrl">
    <div id="dpad">
      <button class="dp" id="dup">▲</button>
      <button class="dp" id="dlt">◀</button>
      <button class="dp" id="drt">▶</button>
      <button class="dp" id="ddn">▼</button>
    </div>
    <div id="abwrap">
      <button class="ab" id="btnB">PAUSE</button>
      <button class="ab" id="btnA">TURBO</button>
    </div>
  </div>
</div>
<script>
const vib=p=>{try{navigator.vibrate&&navigator.vibrate(p);}catch(e){}};

// ===================== AUDIO =====================
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playPokeballSound(){
  try{
    const a=getAC(),now=a.currentTime;
    const click=a.createOscillator(),cg=a.createGain();
    click.connect(cg);cg.connect(a.destination);
    click.type='square';click.frequency.setValueAtTime(800,now);click.frequency.exponentialRampToValueAtTime(200,now+0.06);
    cg.gain.setValueAtTime(0.3,now);cg.gain.exponentialRampToValueAtTime(0.001,now+0.08);
    click.start(now);click.stop(now+0.08);
    const sweep=a.createOscillator(),sg=a.createGain(),filt=a.createBiquadFilter();
    sweep.connect(filt);filt.connect(sg);sg.connect(a.destination);
    sweep.type='sine';filt.type='bandpass';filt.frequency.value=1200;filt.Q.value=2;
    sweep.frequency.setValueAtTime(300,now+0.05);sweep.frequency.exponentialRampToValueAtTime(1800,now+0.18);sweep.frequency.exponentialRampToValueAtTime(900,now+0.35);
    sg.gain.setValueAtTime(0,now+0.05);sg.gain.linearRampToValueAtTime(0.25,now+0.12);sg.gain.exponentialRampToValueAtTime(0.001,now+0.38);
    sweep.start(now+0.05);sweep.stop(now+0.4);
    const ping=a.createOscillator(),pg=a.createGain();
    ping.connect(pg);pg.connect(a.destination);
    ping.type='sine';ping.frequency.setValueAtTime(2400,now+0.1);ping.frequency.exponentialRampToValueAtTime(1600,now+0.3);
    pg.gain.setValueAtTime(0,now+0.1);pg.gain.linearRampToValueAtTime(0.18,now+0.14);pg.gain.exponentialRampToValueAtTime(0.001,now+0.32);
    ping.start(now+0.1);ping.stop(now+0.35);
  }catch(e){}
}

function playGameOverJingle(){
  try{
    const a=getAC(),t=a.currentTime;
    function n(freq,start,dur,vol,type){
      const osc=a.createOscillator(),g=a.createGain();
      osc.connect(g);g.connect(a.destination);
      osc.type=type||'square';osc.frequency.setValueAtTime(freq,t+start);
      g.gain.setValueAtTime(0,t+start);g.gain.linearRampToValueAtTime(vol,t+start+0.01);
      g.gain.setValueAtTime(vol,t+start+dur*0.65);g.gain.exponentialRampToValueAtTime(0.001,t+start+dur);
      osc.start(t+start);osc.stop(t+start+dur+0.05);
    }
    // G A B D B A G — happy bouncy skip
    [[392,0.00,0.10,0.2],[440,0.11,0.10,0.2],[493,0.22,0.10,0.2],[587,0.33,0.14,0.2],
     [493,0.48,0.10,0.2],[440,0.59,0.10,0.2],[392,0.70,0.22,0.2]
    ].forEach(([f,s,d,v])=>n(f,s,d,v,'square'));
    [[196,0.00,0.32,0.09],[220,0.33,0.26,0.09],[196,0.60,0.32,0.09]
    ].forEach(([f,s,d,v])=>n(f,s,d,v,'triangle'));
    function tap(time){
      const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
      o.type='sine';o.frequency.setValueAtTime(300,t+time);o.frequency.exponentialRampToValueAtTime(80,t+time+0.06);
      g.gain.setValueAtTime(0.18,t+time);g.gain.exponentialRampToValueAtTime(0.001,t+time+0.07);
      o.start(t+time);o.stop(t+time+0.08);
    }
    [0,0.11,0.22,0.33,0.48,0.59,0.70].forEach(tap);
  }catch(e){}
}

function playVictoryFanfare(){
  try{
    const a=getAC(),now=a.currentTime;
    function note(freq,start,dur,vol,type){
      const osc=a.createOscillator(),g=a.createGain();
      osc.connect(g);g.connect(a.destination);
      osc.type=type||'square';osc.frequency.setValueAtTime(freq,now+start);
      g.gain.setValueAtTime(0,now+start);g.gain.linearRampToValueAtTime(vol,now+start+0.01);
      g.gain.setValueAtTime(vol,now+start+dur*0.7);g.gain.exponentialRampToValueAtTime(0.001,now+start+dur);
      osc.start(now+start);osc.stop(now+start+dur+0.05);
    }
    [[261.6,0.00,0.12,0.22],[329.6,0.13,0.12,0.22],[392.0,0.26,0.12,0.22],
     [523.3,0.39,0.18,0.22],[659.3,0.58,0.18,0.22],[784.0,0.77,0.18,0.22],
     [1046.5,0.96,0.40,0.22],[784.0,1.38,0.12,0.22],[880.0,1.51,0.12,0.22],
     [1046.5,1.64,0.12,0.22],[1174.7,1.77,0.55,0.22]].forEach(([f,s,d,v])=>note(f,s,d,v,'square'));
    [[130.8,0.00,0.12,0.12],[164.8,0.13,0.12,0.12],[196.0,0.26,0.12,0.12],
     [261.6,0.39,0.36,0.12],[329.6,0.77,0.36,0.12],[261.6,1.14,0.36,0.12],
     [392.0,1.64,0.55,0.12]].forEach(([f,s,d,v])=>note(f,s,d,v,'triangle'));
    function kick(tm){
      const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
      o.type='sine';o.frequency.setValueAtTime(180,now+tm);o.frequency.exponentialRampToValueAtTime(40,now+tm+0.15);
      g.gain.setValueAtTime(0.28,now+tm);g.gain.exponentialRampToValueAtTime(0.001,now+tm+0.18);
      o.start(now+tm);o.stop(now+tm+0.2);
    }
    function snare(tm){
      const buf=a.createBuffer(1,a.sampleRate*0.12,a.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
      const src=a.createBufferSource(),g=a.createGain(),filt=a.createBiquadFilter();
      src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(a.destination);
      filt.type='highpass';filt.frequency.value=1500;
      g.gain.setValueAtTime(0.1,now+tm);g.gain.exponentialRampToValueAtTime(0.001,now+tm+0.12);
      src.start(now+tm);src.stop(now+tm+0.15);
    }
    [0,0.39,0.77,1.14,1.64].forEach(kick);
    [0.26,0.58,0.96,1.38].forEach(snare);
    [261.6,329.6,392.0,523.3,659.3].forEach(f=>note(f,2.22,0.9,0.14,'square'));
  }catch(e){}
}

// ===================== CANVAS SIZING =====================
function computeCanvasHeight(){
  const vh=window.innerHeight;
  const gbStyle=getComputedStyle(document.getElementById('gb'));
  const gbPadV=parseFloat(gbStyle.paddingTop)+parseFloat(gbStyle.paddingBottom);
  const bezelStyle=getComputedStyle(document.getElementById('bezel'));
  const bezelPadV=parseFloat(bezelStyle.paddingTop)+parseFloat(bezelStyle.paddingBottom);
  const bezelMarB=parseFloat(bezelStyle.marginBottom||10);
  const slabelH=document.getElementById('slabel').offsetHeight+5;
  const hudH=document.getElementById('hud').offsetHeight+3;
  const dbarH=document.getElementById('dbar').offsetHeight+9;
  const bctrlH=document.getElementById('bctrl').offsetHeight+10;
  const reserved=20+gbPadV+bezelPadV+bezelMarB+6+slabelH+hudH+dbarH+bctrlH+26;
  return Math.max(260,Math.floor(vh-reserved));
}
function resizeCanvas(){
  const c=document.getElementById('gamecanvas');
  const displayW=c.offsetWidth||380;
  const availH=computeCanvasHeight();
  const ratio=displayW/380;
  // CELL is always square — same as TW
  const CELL=Math.round(TW);
  // fit as many complete rows as possible
  const newROWS=Math.max(12,Math.floor((availH/ratio)/CELL));
  // canvas height = exactly CELL*ROWS rows — perfectly square cells
  const exactH=newROWS*CELL;
  c.width=380;c.height=exactH;
  CH=exactH;ROWS=newROWS;TH=CELL;
  // leftover pixels = what we didn't use for the canvas
  const leftover=Math.floor((availH/ratio)-exactH);
  // donate leftover to HUD font size (base 8px + up to 8px extra)
  const hudSize=Math.min(16,8+Math.floor(leftover/3));
  document.getElementById('hud').style.fontSize=hudSize+'px';
  document.getElementById('hud').style.padding='4px 2px '+(4+Math.floor(leftover/4))+'px';
  if(state==='idle')splash();
  else if(state==='playing')draw();
  else if(state==='win'){}
}

// ===================== GAME VARS =====================
const canvas=document.getElementById('gamecanvas');
const ctx=canvas.getContext('2d');
let CW=380,CH=360,COLS=19,ROWS=18;
const TW=CW/COLS; // ~20px — this is the square cell size
let TH=TW; // TH always equals TW — perfectly square cells

const NAMES=["Bulbasaur","Ivysaur","Venusaur","Charmander","Charmeleon","Charizard","Squirtle","Wartortle","Blastoise","Caterpie","Metapod","Butterfree","Weedle","Kakuna","Beedrill","Pidgey","Pidgeotto","Pidgeot","Rattata","Raticate","Spearow","Fearow","Ekans","Arbok","Pikachu","Raichu","Sandshrew","Sandslash","Nidoran♀","Nidorina","Nidoqueen","Nidoran♂","Nidorino","Nidoking","Clefairy","Clefable","Vulpix","Ninetales","Jigglypuff","Wigglytuff","Zubat","Golbat","Oddish","Gloom","Vileplume","Paras","Parasect","Venonat","Venomoth","Diglett","Dugtrio","Meowth","Persian","Psyduck","Golduck","Mankey","Primeape","Growlithe","Arcanine","Poliwag","Poliwhirl","Poliwrath","Abra","Kadabra","Alakazam","Machop","Machoke","Machamp","Bellsprout","Weepinbell","Victreebel","Tentacool","Tentacruel","Geodude","Graveler","Golem","Ponyta","Rapidash","Slowpoke","Slowbro","Magnemite","Magneton","Farfetch'd","Doduo","Dodrio","Seel","Dewgong","Grimer","Muk","Shellder","Cloyster","Gastly","Haunter","Gengar","Onix","Drowzee","Hypno","Krabby","Kingler","Voltorb","Electrode","Exeggcute","Exeggutor","Cubone","Marowak","Hitmonlee","Hitmonchan","Lickitung","Koffing","Weezing","Rhyhorn","Rhydon","Chansey","Tangela","Kangaskhan","Horsea","Seadra","Goldeen","Seaking","Staryu","Starmie","Mr. Mime","Scyther","Jynx","Electabuzz","Magmar","Pinsir","Tauros","Magikarp","Gyarados","Lapras","Ditto","Eevee","Vaporeon","Jolteon","Flareon","Porygon","Omanyte","Omastar","Kabuto","Kabutops","Aerodactyl","Snorlax","Articuno","Zapdos","Moltres","Dratini","Dragonair","Dragonite","Mewtwo","Mew"];

let snake,dir,ndir,food,score,best=0,timer,state='idle';

let caught=new Set(),popups=[],turbo=false,paused=false;
let imgs={};
const BS=254,TS=150;
const SZ=62; // victory sprite size

// preload all 151
function img(id){
  if(imgs[id])return imgs[id];
  const i=new Image();i.crossOrigin='anonymous';
  i.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
  return imgs[id]=i;
}
for(let i=1;i<=151;i++)img(i);

// ===================== VICTORY ANIMATION STATE =====================
let winAnimFrame=null,winLanded=[],winFalling=[],winLaunchIdx=0,winLastLaunch=0;
let winAllLaunched=false,winAllDone=false,winTitleAlpha=0,winShowTitle=false;
let winPokeballInterval=null,winStartTime=0,winOrder=[];
const WIN_FANFARE_END=3150; // ms when fanfare ends

function makeFalling(id){
  return {
    id,img:imgs[id],
    x:Math.random()*(CW-SZ*0.5)-SZ*0.25,
    y:-SZ-Math.random()*60,
    vy:2.0+Math.random()*2.4,
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:0.06+Math.random()*0.05,
    wobbleAmp:(Math.random()-0.5)*5,
    bounceVy:0,bouncing:false,bounceCount:0,
  };
}

function startWinAnim(){
  winLanded=[];winFalling=[];winLaunchIdx=0;winLastLaunch=0;
  winAllLaunched=false;winAllDone=false;winTitleAlpha=0;winShowTitle=false;
  winStartTime=Date.now();
  winOrder=[...Array(151).keys()].map(i=>i+1);
  winOrder.sort(()=>Math.random()-0.5);
  if(winAnimFrame)cancelAnimationFrame(winAnimFrame);
  if(winPokeballInterval){clearInterval(winPokeballInterval);winPokeballInterval=null;}
  playVictoryFanfare();
  winPokeballInterval=setInterval(()=>{
    if(winAllDone){clearInterval(winPokeballInterval);winPokeballInterval=null;return;}
    playPokeballSound();
  },160+Math.floor(Math.random()*200));
  winLoop();
}

function winLoop(){
  const now=Date.now();
  const elapsed=now-winStartTime;
  if(elapsed>=WIN_FANFARE_END&&!winShowTitle) winShowTitle=true;
  if(winShowTitle&&winTitleAlpha<1) winTitleAlpha=Math.min(1,winTitleAlpha+0.06);

  // launch a sprite every ~260ms
  if(!winAllLaunched&&now-winLastLaunch>260){
    if(winLaunchIdx<151){
      winFalling.push(makeFalling(winOrder[winLaunchIdx]));
      winLaunchIdx++;winLastLaunch=now;
    }else winAllLaunched=true;
  }

  // draw background
  ctx.fillStyle='#071a18';ctx.fillRect(0,0,CW,CH);
  const sq=TW;
  ctx.strokeStyle='rgba(50,180,160,0.07)';ctx.lineWidth=0.3;
  for(let x=0;x<=CW;x+=sq){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<=CH;y+=sq){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  ctx.save();ctx.globalAlpha=0.06;
  const wbcx=CW/2,wbcy=CH/2,wbr=Math.min(CW,CH)*.28;
  ctx.beginPath();ctx.arc(wbcx,wbcy,wbr,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(wbcx,wbcy,wbr,Math.PI,0);ctx.fillStyle='#ff4444';ctx.fill();
  ctx.beginPath();ctx.arc(wbcx,wbcy,wbr,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.moveTo(wbcx-wbr,wbcy);ctx.lineTo(wbcx+wbr,wbcy);ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.arc(wbcx,wbcy,wbr*.22,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.restore();

  // scroll pile down if too high
  if(winLanded.length>0){
    const topY=Math.min(...winLanded.map(s=>s.y));
    if(topY<CH*0.12){
      winLanded.forEach(s=>s.y+=2.5);
      winLanded=winLanded.filter(s=>s.y<CH+SZ);
    }
  }

  // draw landed
  winLanded.forEach(s=>{
    if(s.img&&s.img.complete&&s.img.naturalWidth>0)
      ctx.drawImage(s.img,s.x,s.y,SZ,SZ);
  });

  // update falling
  winFalling=winFalling.filter(p=>{
    p.wobble+=p.wobbleSpeed;
    const wobbleX=Math.sin(p.wobble)*p.wobbleAmp;
    let landY=CH-SZ;
    winLanded.forEach(s=>{
      if(Math.abs(s.x-p.x)<SZ*0.85){
        const cand=s.y-SZ*0.75;
        if(cand<landY)landY=cand;
      }
    });
    landY=Math.max(CH*0.08,landY);
    if(p.bouncing){
      p.y+=p.bounceVy;p.bounceVy+=1.1;
      if(p.y>=landY){
        p.y=landY;p.bounceVy*=-0.28;p.bounceCount++;
        if(Math.abs(p.bounceVy)<0.9||p.bounceCount>2){
          winLanded.push({img:p.img,x:p.x+wobbleX,y:p.y});return false;
        }
      }
    }else{
      p.y+=p.vy;
      if(p.y>=landY){p.y=landY;p.bouncing=true;p.bounceVy=-p.vy*0.4;}
    }
    if(p.img&&p.img.complete&&p.img.naturalWidth>0){
      ctx.save();ctx.translate(p.x+SZ/2+wobbleX,p.y+SZ/2);
      ctx.drawImage(p.img,-SZ/2,-SZ/2,SZ,SZ);ctx.restore();
    }
    return true;
  });

  if(winAllLaunched&&winFalling.length===0&&!winAllDone){
    winAllDone=true;
    if(winPokeballInterval){clearInterval(winPokeballInterval);winPokeballInterval=null;}
  }

  // draw title over sprites once fanfare ends
  if(winShowTitle){
    ctx.fillStyle=`rgba(7,26,24,${winTitleAlpha*0.78})`;
    ctx.fillRect(0,CH/2-90,CW,200);
    ctx.globalAlpha=winTitleAlpha;
    ctx.textAlign='center';
    ctx.shadowColor='#c8ff00';ctx.shadowBlur=22;
    ctx.fillStyle='#c8ff00';
    ctx.font='bold 11px "Press Start 2P",monospace';
    ctx.fillText("YOU CAUGHT 'EM ALL LEE!!!",CW/2,CH/2-52);
    ctx.shadowBlur=0;
    ctx.shadowColor='#ffee55';ctx.shadowBlur=14;
    ctx.fillStyle='#ffee55';
    ctx.font='bold 13px "Press Start 2P",monospace';
    ctx.fillText("YOU'RE THE",CW/2,CH/2-14);
    ctx.fillText('CHAMPION!!!',CW/2,CH/2+18);
    ctx.shadowBlur=0;
    ctx.fillStyle='#5dc8b8';
    ctx.font='6px "Press Start 2P",monospace';
    ctx.fillText('PRESS TURBO TO PLAY AGAIN',CW/2,CH/2+50);
    ctx.globalAlpha=1;
  }

  winAnimFrame=requestAnimationFrame(winLoop);
}

// ===================== FEDORA SPLASHES =====================
const SPLASHES=[
  {ox:-0.30,oy:0.10,r:0.11,col:'#e03030'},
  {ox:0.20,oy:-0.05,r:0.09,col:'#3060e0'},
  {ox:-0.05,oy:0.28,r:0.08,col:'#20b040'},
  {ox:0.35,oy:0.18,r:0.07,col:'#e0a020'},
  {ox:-0.18,oy:-0.08,r:0.07,col:'#cc30cc'},
];

// ===================== GAME LOGIC =====================
function rFood(s){
  let f,t=0;
  do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};t++;}
  while(t<300&&s.some(p=>p.x===f.x&&p.y===f.y));
  return f;
}
function init(){
  const mx=Math.floor(COLS/2),my=Math.floor(ROWS/2);
  snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  dir={x:1,y:0};ndir={x:1,y:0};score=0;popups=[];
  document.getElementById('sc').textContent=0;food=rFood(snake);
}

function drawBG(){
  ctx.fillStyle='#071a18';ctx.fillRect(0,0,CW,CH);
  const sq=TW;
  for(let r=0;r<Math.ceil(CH/sq)+1;r++)for(let c=0;c<Math.ceil(CW/sq)+1;c++){
    if((r+c)%2===0){ctx.fillStyle='rgba(50,180,160,0.03)';ctx.fillRect(c*sq,r*sq,sq,sq);}
  }
  ctx.strokeStyle='rgba(50,180,160,0.1)';ctx.lineWidth=.3;
  for(let i=0;i<=Math.ceil(CW/sq)+1;i++){ctx.beginPath();ctx.moveTo(i*sq,0);ctx.lineTo(i*sq,CH);ctx.stroke();}
  for(let j=0;j<=Math.ceil(CH/sq)+1;j++){ctx.beginPath();ctx.moveTo(0,j*sq);ctx.lineTo(CW,j*sq);ctx.stroke();}
  ctx.save();ctx.globalAlpha=0.07;
  const cx=CW/2,cy=CH/2,r=Math.min(CW,CH)*.34;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,0);ctx.fillStyle='#ff4444';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r,cy);ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r*.22,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.restore();
}

function pokeball(cx,cy,r){
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,0);ctx.fillStyle='#e00';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#111';ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r,cy);ctx.strokeStyle='#111';ctx.lineWidth=1.2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r*.28,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}

function drawFedora(cx,cy,r){
  const brimW=r*2.2,brimH=r*0.24,crownW=r*1.4,crownH=r*1.05;
  const baseY=cy-r*0.88,topY=baseY-crownH;
  ctx.save();
  ctx.beginPath();ctx.ellipse(cx,baseY+brimH*0.5,brimW*0.5,brimH*0.55,0,0,Math.PI*2);
  ctx.fillStyle='#c8c8c8';ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,baseY,brimW*0.5,brimH*0.5,0,0,Math.PI*2);
  ctx.fillStyle='#f2f2f2';ctx.fill();ctx.strokeStyle='#aaa';ctx.lineWidth=0.6;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-crownW*0.48,baseY);ctx.lineTo(cx-crownW*0.38,topY+crownH*0.18);
  ctx.quadraticCurveTo(cx-crownW*0.28,topY,cx,topY-r*0.08);
  ctx.quadraticCurveTo(cx+crownW*0.28,topY,cx+crownW*0.38,topY+crownH*0.18);
  ctx.lineTo(cx+crownW*0.48,baseY);ctx.closePath();
  ctx.fillStyle='#f0f0f0';ctx.fill();ctx.strokeStyle='#aaa';ctx.lineWidth=0.6;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx-crownW*0.48,baseY);ctx.lineTo(cx-crownW*0.38,topY+crownH*0.18);
  ctx.quadraticCurveTo(cx-crownW*0.28,topY,cx-crownW*0.1,topY-r*0.04);
  ctx.lineTo(cx-crownW*0.1,baseY);ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fill();
  ctx.beginPath();ctx.ellipse(cx,topY-r*0.04,crownW*0.38,r*0.1,0,0,Math.PI*2);
  ctx.fillStyle='#e8e8e8';ctx.fill();ctx.strokeStyle='#aaa';ctx.lineWidth=0.5;ctx.stroke();
  ctx.beginPath();ctx.rect(cx-crownW*0.48,baseY-crownH*0.2,crownW*0.96,crownH*0.14);
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fill();
  SPLASHES.forEach(s=>{
    const sx=cx+s.ox*crownW*0.55,sy=baseY-crownH*0.45+s.oy*crownH*0.4;
    ctx.save();
    ctx.beginPath();ctx.rect(cx-crownW*0.47,topY-r*0.05,crownW*0.94,crownH+r*0.05);ctx.clip();
    ctx.beginPath();ctx.arc(sx,sy,s.r*r*1.6,0,Math.PI*2);
    ctx.fillStyle=s.col;ctx.globalAlpha=0.88;ctx.fill();
    ctx.beginPath();ctx.ellipse(sx,sy+s.r*r*1.8,s.r*r*0.55,s.r*r*1.1,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+s.r*r*1.4,sy-s.r*r*0.6,s.r*r*0.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  });
  ctx.restore();
}

function drawSnakeHead(x,y,d){
  const cx=x+TW/2,cy=y+TH/2,r=Math.min(TW,TH)*.44;
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='#f0c000';ctx.fill();
  ctx.strokeStyle='#b08800';ctx.lineWidth=1;ctx.stroke();
  let e1,e2;
  if(d.x===1){e1={x:cx+r*.22,y:cy-r*.28};e2={x:cx+r*.22,y:cy+r*.28};}
  else if(d.x===-1){e1={x:cx-r*.22,y:cy-r*.28};e2={x:cx-r*.22,y:cy+r*.28};}
  else if(d.y===-1){e1={x:cx-r*.28,y:cy-r*.22};e2={x:cx+r*.28,y:cy-r*.22};}
  else{e1={x:cx-r*.28,y:cy+r*.22};e2={x:cx+r*.28,y:cy+r*.22};}
  const er=r*.3;
  [e1,e2].forEach(e=>{
    ctx.beginPath();ctx.arc(e.x,e.y,er,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=0.8;ctx.stroke();
  });
  const po=er*.38;let px=d.x*po,py=d.y*po;
  [e1,e2].forEach(e=>{
    ctx.beginPath();ctx.arc(e.x+px,e.y+py,er*.52,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
    ctx.beginPath();ctx.arc(e.x+px+er*.18,e.y+py-er*.18,er*.18,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  });
  drawFedora(cx,cy,r);
  ctx.restore();
}

function drawSnakeBody(p,i){
  const cx=p.x*TW+TW/2,cy=p.y*TH+TH/2;
  const sz=Math.min(TW,TH);const pad=2;
  const shade=Math.max(0,1-i*0.015);
  const g=Math.round(180*shade+40);
  ctx.fillStyle=`rgb(240,${g},0)`;
  ctx.beginPath();ctx.roundRect(cx-sz/2+pad,cy-sz/2+pad,sz-pad*2,sz-pad*2,4);ctx.fill();
  ctx.strokeStyle='#b08800';ctx.lineWidth=0.5;ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath();ctx.arc(cx,cy,sz*.2,0,Math.PI*2);ctx.fill();
}

function popupDraw(){
  const now=Date.now();
  popups=popups.filter(p=>now-p.t<2400);
  popups.forEach(p=>{
    const age=(now-p.t)/2400,sc=.5+age*1.3,al=age<0.6?1:1-((age-0.6)/0.4);
    const px=p.x*TW+TW/2, py=p.y*TH+TH/2-age*35;
    // draw sprite with scale transform
    ctx.save();ctx.globalAlpha=al;
    ctx.translate(px,py);ctx.scale(sc,sc);
    if(p.i.complete&&p.i.naturalWidth>0)ctx.drawImage(p.i,-24,-24,48,48);
    ctx.restore();
    // draw text WITHOUT scale — fixed size, always crisp
    ctx.save();ctx.globalAlpha=al;
    ctx.translate(px,py);
    ctx.font='bold 7px "Press Start 2P",monospace';ctx.textAlign='center';

    // black outline
    ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(p.n,0,38);
    // white fill
    ctx.fillStyle='#fff';ctx.fillText(p.n,0,38);
    ctx.restore();
  });
}

function draw(){
  drawBG();
  for(let i=snake.length-1;i>0;i--)drawSnakeBody(snake[i],i);
  drawSnakeHead(snake[0].x*TW,snake[0].y*TH,dir);
  pokeball(food.x*TW+TW/2, food.y*TH+TH/2, Math.min(TW,TH)*.36);
  popupDraw();
  if(paused&&state==='playing'){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,CW,CH);
    ctx.shadowColor='#ffee55';ctx.shadowBlur=10;
    ctx.fillStyle='#ffee55';ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';
    ctx.fillText('PAUSED',CW/2,CH/2-8);ctx.shadowBlur=0;
    ctx.fillStyle='#888';ctx.font='6px "Press Start 2P",monospace';
    ctx.fillText('PRESS TURBO TO RESUME',CW/2,CH/2+14);
  }
}

function addPopup(x,y,id){
  popups.push({x,y,t:Date.now(),i:img(id),n:NAMES[id-1].toUpperCase()});
}

function step(){
  if(paused)return;
  dir=ndir;
  const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(p=>p.x===h.x&&p.y===h.y)){end();return;}
  snake.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    score++;if(score>best)best=score;
    document.getElementById('sc').textContent=score;
    document.getElementById('hi').textContent=best;
    playPokeballSound();
    const av=[...Array(151).keys()].map(i=>i+1).filter(i=>!caught.has(i));
    if(av.length){
      const id=av[Math.floor(Math.random()*av.length)];
      caught.add(id);document.getElementById('cc').textContent=caught.size;
      addPopup(food.x,food.y,id);
      if(caught.size===151){setTimeout(()=>{win();},1800);}
    }
    food=rFood(snake);
  }else snake.pop();
  draw();
}

function start(){
  if(timer)clearInterval(timer);
  if(winAnimFrame){cancelAnimationFrame(winAnimFrame);winAnimFrame=null;}
  if(winPokeballInterval){clearInterval(winPokeballInterval);winPokeballInterval=null;}
  caught.clear();paused=false;turbo=false;
  document.getElementById('cc').textContent=0;
  document.getElementById('btnB').textContent='PAUSE';
  hideDex();init();state='playing';
  timer=setInterval(step,BS);
}

function end(){
  clearInterval(timer);timer=null;state='dead';
  playGameOverJingle();
  showDex(false);
}

function win(){
  clearInterval(timer);timer=null;state='win';
  hideDex();
  startWinAnim();
}

function showDex(w){
  const grid=document.getElementById('dexgrid');
  document.getElementById('dextitle').textContent='YOU CAUGHT '+caught.size+' POKEMON LEE!';
  document.getElementById('dexsub').textContent='CAUGHT: '+caught.size+'/151';
  grid.innerHTML='';
  const arr=[...caught].sort((a,b)=>a-b);
  if(!arr.length){
    const e=document.createElement('div');
    e.style.cssText='grid-column:1/-1;text-align:center;color:#444;font-size:7px;padding:24px;font-family:"Press Start 2P",monospace;line-height:2;';
    e.textContent='NO POKEMON CAUGHT';grid.appendChild(e);
  }else{
    arr.forEach(id=>{
      const cell=document.createElement('div');cell.className='dexcell';
      const im=document.createElement('img');
      im.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
      im.width=56;im.height=56;
      const num=document.createElement('div');num.className='dexnum';num.textContent='#'+String(id).padStart(3,'0');
      const name=document.createElement('div');name.className='dexname';name.textContent=NAMES[id-1].toUpperCase();
      cell.appendChild(im);cell.appendChild(num);cell.appendChild(name);grid.appendChild(cell);
    });
  }
  document.getElementById('dexscroll').scrollTop=0;
  document.getElementById('dexoverlay').classList.add('show');
}

function hideDex(){document.getElementById('dexoverlay').classList.remove('show');}

function splash(){
  ctx.fillStyle='#071a18';ctx.fillRect(0,0,CW,CH);
  ctx.save();ctx.globalAlpha=0.07;
  const wcx=CW/2,wcy=CH/2,wr=Math.min(CW,CH)*.34;
  ctx.beginPath();ctx.arc(wcx,wcy,wr,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(wcx,wcy,wr,Math.PI,0);ctx.fillStyle='#ff4444';ctx.fill();
  ctx.beginPath();ctx.arc(wcx,wcy,wr,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.moveTo(wcx-wr,wcy);ctx.lineTo(wcx+wr,wcy);ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.arc(wcx,wcy,wr*.22,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.restore();
  const midY=CH/2;
  ctx.textAlign='center';
  ctx.shadowColor='#c8ff00';ctx.shadowBlur=22;
  ctx.fillStyle='#c8ff00';
  ctx.font='bold 17px "Press Start 2P",monospace';
  ctx.fillText("LEE'S POKÉDEX",CW/2,midY-52);
  ctx.font='bold 17px "Press Start 2P",monospace';
  ctx.fillText('SNAKE GAME',CW/2,midY-22);
  ctx.shadowBlur=0;
  ctx.fillStyle='#5dc8b8';ctx.font='14px "Press Start 2P",monospace';
  ctx.fillText('CATCH ALL 151 POKÉMON!',CW/2,midY+18);
  ctx.fillStyle='#aaa';ctx.font='12px "Press Start 2P",monospace';
  ctx.fillText('PRESS TURBO TO START',CW/2,midY+46);
}

// D-pad
const DM={dup:{x:0,y:-1},ddn:{x:0,y:1},dlt:{x:-1,y:0},drt:{x:1,y:0}};
Object.entries(DM).forEach(([id,d])=>{
  document.getElementById(id).addEventListener('pointerdown',e=>{
    e.preventDefault();
    vib([54,27,54]);
    if(state==='playing'&&!(d.x===-dir.x&&d.y===-dir.y))ndir=d;
  });
});

document.getElementById('btnB').addEventListener('pointerdown',e=>{
  e.preventDefault();
  vib(100);
  if(state!=='playing')return;
  paused=!paused;
  document.getElementById('btnB').textContent=paused?'RESUME':'PAUSE';
  draw();
});

document.getElementById('btnA').addEventListener('pointerdown',e=>{
  e.preventDefault();
  vib(100);
  if(state==='win'||state==='dead'){start();return;}
  if(state==='idle'){start();return;}
  if(paused){paused=false;document.getElementById('btnB').textContent='PAUSE';draw();return;}
  turbo=true;if(timer){clearInterval(timer);timer=setInterval(step,TS);}
});
['pointerup','pointerleave','pointercancel'].forEach(ev=>{
  document.getElementById('btnA').addEventListener(ev,()=>{
    turbo=false;if(timer&&state==='playing'){clearInterval(timer);timer=setInterval(step,BS);}
  });
});

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d',' '].includes(e.key))e.preventDefault();
  if(e.key===' '){
    if(state!=='playing'){start();return;}
    paused=!paused;document.getElementById('btnB').textContent=paused?'RESUME':'PAUSE';draw();return;
  }
  const km={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const d=km[e.key];
  if(d&&state==='playing'&&!(d.x===-dir.x&&d.y===-dir.y))ndir=d;
  if(e.key==='Shift'){
    if(state!=='playing'){start();return;}
    turbo=true;if(timer){clearInterval(timer);timer=setInterval(step,TS);}
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='Shift'){turbo=false;if(timer&&state==='playing'){clearInterval(timer);timer=setInterval(step,BS);}}
});

window.addEventListener('load',()=>{setTimeout(()=>{resizeCanvas();splash();},120);});
window.addEventListener('resize',()=>{resizeCanvas();if(state==='idle')splash();});
splash();
</script>
